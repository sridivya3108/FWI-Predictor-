<!DOCTYPE html>
<html>
<head>
<title>FWI Predictor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #eef2f3;
    font-family: 'Segoe UI', sans-serif;
}

/* MAIN CONTAINER */
.container-box {
    max-width: 1000px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.title {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 25px;
}

/* SECTION */
.section {
    background: #f8fafc;
    padding: 20px;
    border-radius: 10px;
}

/* INPUTS */
.form-control {
    height: 48px;
    border-radius: 8px;
    margin-bottom: 12px;
}

/* HEADINGS */
h5 {
    margin-bottom: 15px;
    font-weight: 600;
}

/* CENTER CLASS */
.center-class {
    max-width: 300px;
    margin: 20px auto;
}

/* BUTTON */
button {
    height: 50px;
    font-size: 16px;
}
.class-btn {
    padding: 10px 20px;
    border-radius: 10px;
    background: #f1f5f9;
    cursor: pointer;
    transition: 0.3s;
    border: 2px solid transparent;
}

/* Hover */
.class-btn:hover {
    background: #e2e8f0;
}

/* Selected state */
input[type="radio"]:checked + .class-btn {
    border: 2px solid #16a34a;
    background: #dcfce7;
}
</style>

</head>

<body>

<div class="container-box">

<div class="title"> Fire Weather Index Predictor</div>

<form action="/predict" method="POST">

<!-- SECTIONS -->
<div class="row align-items-stretch">

<!-- LEFT -->
<div class="col-md-6 d-flex">
<div class="section w-100">

<h5>📅 Date & Weather</h5>

<input type="number" name="day" class="form-control" placeholder="Day (1-31)">
<input type="number" name="month" class="form-control" placeholder="Month (1-12)">
<input type="number" name="year" class="form-control" placeholder="Year (e.g., 2012)">

<input type="number" step="any" name="temp" class="form-control" placeholder="Temperature (°C)">
<input type="number" step="any" name="humidity" class="form-control" placeholder="Humidity (%)">

<input type="number" step="any" name="wind" class="form-control" placeholder="Wind Speed">
<input type="number" step="any" name="rain" class="form-control" placeholder="Rainfall">

</div>
</div>

<!-- RIGHT -->
<div class="col-md-6 d-flex">
<div class="section w-100">

<h5> Fire Index</h5>

<input type="number" step="any" name="ffmc" class="form-control" placeholder="FFMC">
<input type="number" step="any" name="dmc" class="form-control" placeholder="DMC">

<input type="number" step="any" name="isi" class="form-control" placeholder="ISI">
<input type="number" step="any" name="dc" class="form-control" placeholder="DC">

<input type="number" step="any" name="bui" class="form-control" placeholder="BUI">
<input type="number" step="any" name="fwi" class="form-control" placeholder="FWI">

<input type="number" name="region" min="0" max="1" class="form-control" placeholder="Region (0 or 1)">

</div>
</div>

</div>

<!--  CENTERED CLASS -->
<div class="center-class">
<div class="center-class text-center">

<label class="mb-2 fw-semibold">Fire Class</label>

<div class="d-flex justify-content-center gap-3">

<input type="radio" id="notfire" name="classes" value="0" hidden>
<label for="notfire" class="class-btn"> Fired</label>

<input type="radio" id="fire" name="classes" value="1" hidden>
<label for="fire" class="class-btn">  Not Fired</label>

</div>

</div>
</div>

<!-- BUTTON -->
<button type="submit" class="btn btn-success w-100">
Predict
</button>

</form>

</div>

</body>
</html>
