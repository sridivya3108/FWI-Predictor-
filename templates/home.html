<!DOCTYPE html>
<html>
<head>
<title>Forest Fire Prediction</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(to right,#ff9966,#ff5e62);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
width:420px;
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
}

input{
width:100%;
padding:8px;
margin:8px 0 15px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#ff5e62;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e0484d;
}

</style>

</head>

<body>

<div class="container">

<h2>Forest Fire Weather Index Prediction</h2>

<form action="/predict" method="post">

<label>Temperature</label>
<input type="text" name="Temperature">

<label>Relative Humidity</label>
<input type="text" name="RH">

<label>Wind Speed</label>
<input type="text" name="Ws">

<label>Rain</label>
<input type="text" name="Rain">

<label>FFMC</label>
<input type="text" name="FFMC">

<label>DMC</label>
<input type="text" name="DMC">

<label>ISI</label>
<input type="text" name="ISI">

<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
